server:
  port: 8084

spring:
  application:
    name: recommendation-service
  datasource:
    url: jdbc:mysql://localhost:3306/mall_recommendation?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: "123456"
